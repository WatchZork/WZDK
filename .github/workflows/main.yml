name: Quality & Security Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: MegaLinter (C/C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/c_cpp@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_LINTERS: REPOSITORY_SECRETS

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
#    needs: lint 
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config="p/c" \
            --config="p/cpp" \
            --error
