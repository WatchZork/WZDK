name: Quality & Security Gate

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  lint:
    name: MegaLinter (C/C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_SUBMODULE_PAT }}
          submodules: recursive
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter/flavors/c_cpp@v7
        env:
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_LINTERS: C_CPP_CLANG_FORMAT,C_CPP_CPPCHECK,C_CPP_CPPLINT
          APPLY_FIXES: none
          GIT_AUTHOR_NAME: "WatchZork Security Bot"
          GIT_AUTHOR_EMAIL: "devsecops@watchzork.local"

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_SUBMODULE_PAT }}
          submodules: recursive

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config="p/c" \
            --config="p/cpp" \
            --no-suppress-errors \
            --sarif --output=semgrep.sarif
            
      - name: Upload SARIF to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif   
          
      - name: Upload SARIF as Downloadable Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep.sarif
